name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run JS tests
        run: |
          node --test test-js.mjs

      - name: Lint skill files
        run: |
          npx markdownlint-cli2 SKILL.md README.md --config references/.markdownlint.json
          npx markdownlint-cli2 . --config references/.markdownlint.json

  markdown-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown format
        run: |
          npx markdownlint-cli2 . --config references/.markdownlint.json || true